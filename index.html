<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>qwiic_joystick · tinyStudio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<style>
  :root {
    --navy-1000:#05081a; --navy-900:#070b22; --navy-800:#0a0f2d; --navy-700:#11173a;
    --navy-600:#1a1f4d; --navy-500:#262c5e; --navy-400:#353c78;
    --cyan:#00f0ff; --pink:#ff3f8c; --fg-1:#fff; --fg-2:rgba(235,238,255,.72); --fg-3:rgba(214,220,255,.46);
    --grad: linear-gradient(45deg, var(--cyan), var(--pink));
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; display: flex; align-items: center; justify-content: center; padding: 24px;
    background: radial-gradient(1100px 560px at 50% -8%, #16204d 0%, var(--navy-800) 55%, var(--navy-900) 100%);
    color: var(--fg-1); font-family: 'Plus Jakarta Sans', system-ui, -apple-system, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .cabinet {
    width: min(92vw, 540px); background: linear-gradient(180deg, var(--navy-700), var(--navy-800));
    border: 1px solid var(--navy-400); border-radius: 20px; padding: 16px;
    box-shadow: 0 24px 70px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.04);
    display: flex; flex-direction: column; gap: 14px;
  }
  .bar { display: flex; align-items: center; gap: 12px; padding: 2px 4px; }
  .title { flex: 1; min-width: 0; font-size: 17px; font-weight: 700; letter-spacing: -0.01em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .connect { font: inherit; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap;
    display: inline-flex; align-items: center; gap: 7px; border: 1px solid var(--navy-400);
    background: var(--navy-600); color: var(--fg-1); border-radius: 999px; padding: 7px 14px; transition: .15s; }
  .connect:hover:not(:disabled) { background: var(--navy-500); }
  .connect:disabled { cursor: default; border-color: rgba(61,220,151,.4); color: #bff7df; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #4a5296; flex: none; }
  .dot.on { background: #3ddc97; box-shadow: 0 0 9px #3ddc97; }
  /* The "screen": a fixed square the sketch is letterboxed into. */
  .screen { position: relative; width: 100%; aspect-ratio: 1 / 1; border-radius: 14px;
    background: var(--navy-1000); border: 1px solid var(--navy-600);
    box-shadow: inset 0 0 0 1px rgba(0,240,255,.06), inset 0 18px 60px rgba(0,0,0,.5); overflow: hidden; }
  .screen::before { content: ''; position: absolute; inset: 0; border-radius: 14px; pointer-events: none;
    box-shadow: inset 0 1px 0 rgba(0,240,255,.14); }
  #stage { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  #stage canvas { max-width: 100%; max-height: 100%; width: auto !important; height: auto !important; border-radius: 8px; }
  .credit { text-align: center; font-size: 12px; color: var(--fg-3); padding-top: 2px; }
  .credit a { font-weight: 700; text-decoration: none; background: var(--grad);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .credit a:hover { text-decoration: underline; -webkit-text-fill-color: var(--cyan); }
  .spark { color: var(--cyan); }
</style>
</head>
<body>
  <main class="cabinet">
    <div class="bar">
      <div class="title">qwiic_joystick</div>
      <button class="connect" id="connect"><span class="dot" id="dot"></span><span id="label">Connect</span></button>
    </div>
    <div class="screen"><div id="stage"></div></div>
    <div class="credit">Made with <span class="spark">✦</span> <a href="https://tinycore.cc" target="_blank" rel="noreferrer">tinyStudio</a></div>
  </main>

  <script>
  // ---- serial bus + Processing-style shims (match the tinyStudio Visual view) ----
  window.__tinySerial = { lines: [], values: [], last: '', value: 0 };
  function __pushSerial(line) {
    var m = String(line).match(/-?\d+(?:\.\d+)?/);
    var value = m ? parseFloat(m[0]) : (/(HIGH|\bON\b|true)/i.test(line) ? 1 : 0);
    var b = window.__tinySerial;
    b.lines.push(line); if (b.lines.length > 300) b.lines.shift();
    b.values.push(value); if (b.values.length > 300) b.values.shift();
    b.last = line; b.value = value;
    try { window.dispatchEvent(new CustomEvent('tinyserial', { detail: { line: line, value: value } })); } catch (e) {}
  }
  function serialRead() { return window.__tinySerial.last; }
  function serialReadLine() { return window.__tinySerial.last; }
  function serialAvailable() { return window.__tinySerial.lines.length > 0; }
  function serialValue() { return window.__tinySerial.value; }
  function serialValues() { return window.__tinySerial.values.slice(); }
  function serialLines() { return window.__tinySerial.lines.slice(); }

  // ---- Web Serial connection (works on https / GitHub Pages and local file) ----
  var dotEl = document.getElementById('dot');
  var labelEl = document.getElementById('label');
  var connectBtn = document.getElementById('connect');
  function setStatus(text, on) { labelEl.textContent = text; dotEl.className = 'dot' + (on ? ' on' : ''); }

  if (!('serial' in navigator)) {
    setStatus('Use Chrome/Edge', false);
    connectBtn.disabled = true;
  }

  connectBtn.onclick = async function () {
    try {
      var port = await navigator.serial.requestPort();
      await port.open({ baudRate: 9600 });
      setStatus('Connected', true);
      connectBtn.disabled = true;
      var decoder = new TextDecoderStream();
      port.readable.pipeTo(decoder.writable);
      var reader = decoder.readable.getReader();
      var buf = '';
      while (true) {
        var r = await reader.read();
        if (r.done) break;
        buf += r.value;
        var parts = buf.split(/\r?\n/);
        buf = parts.pop();
        for (var i = 0; i < parts.length; i++) if (parts[i]) __pushSerial(parts[i]);
      }
    } catch (e) {
      setStatus('Connect', false);
      connectBtn.disabled = false;
    }
  };

  // ---- the user's sketch (p5 global mode) ----
  // asteroids.js — Qwiic Joystick Asteroids
// Classic Asteroids driven by the SparkFun Qwiic Joystick.
// Reads the same CSV stream as the visualizer:  x,y,button   (x,y in 0..1023)
// Tilt LEFT / RIGHT to rotate, push UP to thrust, press the button to fire.
//
//   serialRead()  -> latest raw line, e.g. "512,498,0"
//   serialLines() -> recent raw lines (unused here, kept for parity)
//   serialEvent() -> fires per new line (kept for parity)
//
// Built for tinyStudio's harness. If the serial functions aren't present
// (e.g. a plain browser / the p5 web editor), it falls back to the keyboard
// (arrows to steer/thrust, space to fire) so you can test before wiring up.

const RANGE = 1023;          // 10-bit ADC full scale
const CENTER = RANGE / 2;    // joystick resting value
const DEADZONE = 90;         // ignore small wobble around center
const START_LIVES = 3;

// ---- palette (matches the visualizer) ----
const C_BG     = [10, 15, 45];
const C_SHIP   = [255, 255, 255];
const C_ROCK   = [150, 162, 196];
const C_BULLET = [255, 215, 0];   // gold
const C_TEXT   = [150, 162, 196];

// ---- tuning ----
const TURN_SPEED   = 0.07;    // radians per frame at full tilt
const THRUST_ACCEL = 0.12;
const FRICTION     = 0.99;
const MAX_SPEED    = 7;
const BULLET_SPEED = 7;
const BULLET_LIFE  = 60;      // frames
const FIRE_COOLDOWN = 10;     // frames between shots

let ship, bullets, rocks;
let score = 0, lives = START_LIVES;
let state = 'play';           // 'play' | 'over'
let joyX = CENTER, joyY = CENTER, lastBtn = 0;
let fireTimer = 0, invuln = 0;

function setup() {
  createCanvas(640, 440);
  textFont('monospace');
  resetGame();
}

function resetGame() {
  score = 0;
  lives = START_LIVES;
  state = 'play';
  bullets = [];
  spawnShip();
  rocks = [];
  for (let i = 0; i < 4; i++) rocks.push(makeRock());
}

function spawnShip() {
  ship = { x: width / 2, y: height / 2, vx: 0, vy: 0, angle: -PI / 2 };
  invuln = 90;
}

// parse "x,y,button" -> {x,y,b} or null  (same regex as the visualizer)
function parseLine(s) {
  let m = String(s).match(/(-?\d+)\s*,\s*(-?\d+)(?:\s*,\s*(\d+))?/);
  if (!m) return null;
  return { x: int(m[1]), y: int(m[2]), b: m[3] ? int(m[3]) : 0 };
}

// read the joystick if the harness is present, else null
function readJoystick() {
  if (typeof serialRead !== 'function') return null;
  return parseLine(serialRead());
}

function makeRock(size, x, y) {
  size = size || 3;                  // 3 = large, 2 = medium, 1 = small
  // spawn at a random edge if no position given
  if (x === undefined) {
    if (random() < 0.5) { x = random() < 0.5 ? 0 : width; y = random(height); }
    else                { x = random(width); y = random() < 0.5 ? 0 : height; }
  }
  let r = size * 16;
  let speed = map(size, 3, 1, 0.7, 2.2);
  let a = random(TWO_PI);
  // give each rock a lumpy outline
  let verts = [];
  let n = floor(random(8, 12));
  for (let i = 0; i < n; i++) {
    verts.push(random(0.75, 1.15));
  }
  return {
    x, y, size, r,
    vx: cos(a) * speed,
    vy: sin(a) * speed,
    rot: random(-0.03, 0.03),
    spin: 0,
    verts
  };
}

function draw() {
  background(C_BG);
  handleInput();
  if (state === 'play') {
    updateShip();
    updateBullets();
    updateRocks();
    checkCollisions();
    if (rocks.length === 0) nextWave();
  }
  drawRocks();
  drawBullets();
  drawShip();
  drawHud();
}

function handleInput() {
  let p = readJoystick();
  let btn = 0;

  if (p) {
    joyX = p.x;
    joyY = p.y;
    btn = p.b;
  } else if (typeof serialRead !== 'function') {
    // no harness: keyboard fallback
    joyX = CENTER + (keyIsDown(RIGHT_ARROW) ? 400 : 0) - (keyIsDown(LEFT_ARROW) ? 400 : 0);
    joyY = CENTER + (keyIsDown(UP_ARROW) ? 400 : 0);
    btn = keyIsDown(32) ? 1 : 0;   // space
  }

  // rising-edge button: fire, or restart when game over
  if (btn === 1 && lastBtn === 0) onButton();
  lastBtn = btn;
}

function onButton() {
  if (state === 'over') {
    resetGame();
  } else if (fireTimer <= 0) {
    fire();
  }
}

function fire() {
  bullets.push({
    x: ship.x + cos(ship.angle) * 14,
    y: ship.y + sin(ship.angle) * 14,
    vx: cos(ship.angle) * BULLET_SPEED + ship.vx,
    vy: sin(ship.angle) * BULLET_SPEED + ship.vy,
    life: BULLET_LIFE
  });
  fireTimer = FIRE_COOLDOWN;
}

function updateShip() {
  if (fireTimer > 0) fireTimer--;
  if (invuln > 0) invuln--;

  // X axis -> rotate (deadzone keeps it steady at rest)
  let dx = joyX - CENTER;
  if (abs(dx) > DEADZONE) ship.angle += (dx / CENTER) * TURN_SPEED;

  // Y axis: push UP to thrust (joystick reads larger when pushed up)
  let dy = joyY - CENTER;
  if (dy > DEADZONE) {
    let t = (dy / CENTER) * THRUST_ACCEL;
    ship.vx += cos(ship.angle) * t;
    ship.vy += sin(ship.angle) * t;
  }

  // clamp speed + friction
  let sp = mag(ship.vx, ship.vy);
  if (sp > MAX_SPEED) { ship.vx *= MAX_SPEED / sp; ship.vy *= MAX_SPEED / sp; }
  ship.vx *= FRICTION;
  ship.vy *= FRICTION;

  ship.x = wrap(ship.x + ship.vx, width);
  ship.y = wrap(ship.y + ship.vy, height);
}

function updateBullets() {
  for (let b of bullets) {
    b.x = wrap(b.x + b.vx, width);
    b.y = wrap(b.y + b.vy, height);
    b.life--;
  }
  bullets = bullets.filter(b => b.life > 0);
}

function updateRocks() {
  for (let r of rocks) {
    r.x = wrap(r.x + r.vx, width);
    r.y = wrap(r.y + r.vy, height);
    r.spin += r.rot;
  }
}

function checkCollisions() {
  // bullets vs rocks
  for (let i = rocks.length - 1; i >= 0; i--) {
    let rock = rocks[i];
    for (let j = bullets.length - 1; j >= 0; j--) {
      let b = bullets[j];
      if (dist(b.x, b.y, rock.x, rock.y) < rock.r) {
        bullets.splice(j, 1);
        rocks.splice(i, 1);
        score += (4 - rock.size) * 10;   // small rocks worth more
        splitRock(rock);
        break;
      }
    }
  }

  // ship vs rocks (ignored while invulnerable)
  if (invuln <= 0) {
    for (let rock of rocks) {
      if (dist(ship.x, ship.y, rock.x, rock.y) < rock.r + 8) {
        loseLife();
        break;
      }
    }
  }
}

function splitRock(rock) {
  if (rock.size <= 1) return;
  for (let k = 0; k < 2; k++) {
    rocks.push(makeRock(rock.size - 1, rock.x, rock.y));
  }
}

function loseLife() {
  lives--;
  if (lives <= 0) {
    state = 'over';
  } else {
    spawnShip();
  }
}

function nextWave() {
  let count = 4 + floor(score / 200);
  for (let i = 0; i < count; i++) rocks.push(makeRock());
}

function wrap(v, max) {
  if (v < 0) return v + max;
  if (v > max) return v - max;
  return v;
}

// ---------- drawing ----------

function drawShip() {
  if (state !== 'play') return;
  if (invuln > 0 && frameCount % 10 < 5) return;   // blink while invulnerable

  push();
  translate(ship.x, ship.y);
  rotate(ship.angle);
  stroke(C_SHIP);
  strokeWeight(2);
  noFill();
  // triangle pointing along +x (angle 0)
  beginShape();
  vertex(14, 0);
  vertex(-10, -9);
  vertex(-5, 0);
  vertex(-10, 9);
  endShape(CLOSE);

  // thrust flame when pushing up
  if (joyY - CENTER > DEADZONE && frameCount % 6 < 3) {
    stroke(C_BULLET);
    line(-5, 0, -16, 0);
  }
  pop();
}

function drawBullets() {
  noStroke();
  fill(C_BULLET);
  for (let b of bullets) circle(b.x, b.y, 4);
}

function drawRocks() {
  stroke(C_ROCK);
  strokeWeight(2);
  noFill();
  for (let r of rocks) {
    push();
    translate(r.x, r.y);
    rotate(r.spin);
    beginShape();
    let n = r.verts.length;
    for (let i = 0; i < n; i++) {
      let a = (i / n) * TWO_PI;
      let rad = r.r * r.verts[i];
      vertex(cos(a) * rad, sin(a) * rad);
    }
    endShape(CLOSE);
    pop();
  }
}

function drawHud() {
  noStroke();
  textAlign(LEFT, TOP);
  textSize(20);
  fill(C_SHIP);
  text(score, 14, 12);

  // lives as little ships
  for (let i = 0; i < lives; i++) {
    push();
    translate(width - 20 - i * 22, 22);
    rotate(-PI / 2);
    stroke(C_SHIP);
    strokeWeight(2);
    noFill();
    beginShape();
    vertex(9, 0);
    vertex(-6, -6);
    vertex(-6, 6);
    endShape(CLOSE);
    pop();
  }

  if (state === 'over') {
    noStroke();
    textAlign(CENTER, CENTER);
    textSize(28);
    fill(C_SHIP);
    text('GAME OVER', width / 2, height / 2 - 16);
    textSize(14);
    fill(C_BULLET);
    text('PRESS BUTTON TO RESTART', width / 2, height / 2 + 16);
  }
}

// fires per new serial line (kept for parity with the harness)
function serialEvent(line) {}

  // route serial lines into the sketch's serialEvent(), if defined
  window.addEventListener('tinyserial', function (e) {
    if (typeof serialEvent === 'function') { try { serialEvent(e.detail.line); } catch (err) {} }
  });

  // p5 global mode appends the canvas to <body>; keep moving it into the framed
  // screen until it lands there (covers timing + canvas recreation).
  function placeCanvas() {
    var c = document.querySelector('canvas');
    var stage = document.getElementById('stage');
    if (c && stage && c.parentElement !== stage) stage.appendChild(c);
  }
  new MutationObserver(placeCanvas).observe(document.body, { childList: true, subtree: true });
  window.addEventListener('load', placeCanvas);
  var __t = 0, __iv = setInterval(function () { placeCanvas(); if (++__t > 30) clearInterval(__iv); }, 100);
  </script>
</body>
</html>
