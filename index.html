<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>qwiic_joystick · tinyStudio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<style>
  :root {
    --navy-1000:#05081a; --navy-900:#070b22; --navy-800:#0a0f2d; --navy-700:#11173a;
    --navy-600:#1a1f4d; --navy-500:#262c5e; --navy-400:#353c78;
    --cyan:#00f0ff; --pink:#ff3f8c; --fg-1:#fff; --fg-2:rgba(235,238,255,.72); --fg-3:rgba(214,220,255,.46);
    --grad: linear-gradient(45deg, var(--cyan), var(--pink));
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; display: flex; align-items: center; justify-content: center; padding: 24px;
    background: radial-gradient(1100px 560px at 50% -8%, #16204d 0%, var(--navy-800) 55%, var(--navy-900) 100%);
    color: var(--fg-1); font-family: 'Plus Jakarta Sans', system-ui, -apple-system, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .cabinet {
    width: min(92vw, 540px); background: linear-gradient(180deg, var(--navy-700), var(--navy-800));
    border: 1px solid var(--navy-400); border-radius: 20px; padding: 16px;
    box-shadow: 0 24px 70px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.04);
    display: flex; flex-direction: column; gap: 14px;
  }
  .bar { display: flex; align-items: center; gap: 12px; padding: 2px 4px; }
  .title { flex: 1; min-width: 0; font-size: 17px; font-weight: 700; letter-spacing: -0.01em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .connect { font: inherit; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap;
    display: inline-flex; align-items: center; gap: 7px; border: 1px solid var(--navy-400);
    background: var(--navy-600); color: var(--fg-1); border-radius: 999px; padding: 7px 14px; transition: .15s; }
  .connect:hover:not(:disabled) { background: var(--navy-500); }
  .connect:disabled { cursor: default; border-color: rgba(61,220,151,.4); color: #bff7df; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #4a5296; flex: none; }
  .dot.on { background: #3ddc97; box-shadow: 0 0 9px #3ddc97; }
  /* The "screen": a fixed square the sketch is letterboxed into. */
  .screen { position: relative; width: 100%; aspect-ratio: 1 / 1; border-radius: 14px;
    background: var(--navy-1000); border: 1px solid var(--navy-600);
    box-shadow: inset 0 0 0 1px rgba(0,240,255,.06), inset 0 18px 60px rgba(0,0,0,.5); overflow: hidden; }
  .screen::before { content: ''; position: absolute; inset: 0; border-radius: 14px; pointer-events: none;
    box-shadow: inset 0 1px 0 rgba(0,240,255,.14); }
  #stage { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  #stage canvas { max-width: 100%; max-height: 100%; width: auto !important; height: auto !important; border-radius: 8px; }
  .credit { text-align: center; font-size: 12px; color: var(--fg-3); padding-top: 2px; }
  .credit a { font-weight: 700; text-decoration: none; background: var(--grad);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .credit a:hover { text-decoration: underline; -webkit-text-fill-color: var(--cyan); }
  .spark { color: var(--cyan); }
</style>
</head>
<body>
  <main class="cabinet">
    <div class="bar">
      <div class="title">qwiic_joystick</div>
      <button class="connect" id="connect"><span class="dot" id="dot"></span><span id="label">Connect</span></button>
    </div>
    <div class="screen"><div id="stage"></div></div>
    <div class="credit">Made with <span class="spark">✦</span> <a href="https://tinycore.cc" target="_blank" rel="noreferrer">tinyStudio</a></div>
  </main>

  <script>
  // ---- serial bus + Processing-style shims (match the tinyStudio Visual view) ----
  window.__tinySerial = { lines: [], values: [], last: '', value: 0 };
  function __pushSerial(line) {
    var m = String(line).match(/-?\d+(?:\.\d+)?/);
    var value = m ? parseFloat(m[0]) : (/(HIGH|\bON\b|true)/i.test(line) ? 1 : 0);
    var b = window.__tinySerial;
    b.lines.push(line); if (b.lines.length > 300) b.lines.shift();
    b.values.push(value); if (b.values.length > 300) b.values.shift();
    b.last = line; b.value = value;
    try { window.dispatchEvent(new CustomEvent('tinyserial', { detail: { line: line, value: value } })); } catch (e) {}
  }
  function serialRead() { return window.__tinySerial.last; }
  function serialReadLine() { return window.__tinySerial.last; }
  function serialAvailable() { return window.__tinySerial.lines.length > 0; }
  function serialValue() { return window.__tinySerial.value; }
  function serialValues() { return window.__tinySerial.values.slice(); }
  function serialLines() { return window.__tinySerial.lines.slice(); }

  // ---- Web Serial connection (works on https / GitHub Pages and local file) ----
  var dotEl = document.getElementById('dot');
  var labelEl = document.getElementById('label');
  var connectBtn = document.getElementById('connect');
  function setStatus(text, on) { labelEl.textContent = text; dotEl.className = 'dot' + (on ? ' on' : ''); }

  if (!('serial' in navigator)) {
    setStatus('Use Chrome/Edge', false);
    connectBtn.disabled = true;
  }

  connectBtn.onclick = async function () {
    try {
      var port = await navigator.serial.requestPort();
      await port.open({ baudRate: 9600 });
      setStatus('Connected', true);
      connectBtn.disabled = true;
      var decoder = new TextDecoderStream();
      port.readable.pipeTo(decoder.writable);
      var reader = decoder.readable.getReader();
      var buf = '';
      while (true) {
        var r = await reader.read();
        if (r.done) break;
        buf += r.value;
        var parts = buf.split(/\r?\n/);
        buf = parts.pop();
        for (var i = 0; i < parts.length; i++) if (parts[i]) __pushSerial(parts[i]);
      }
    } catch (e) {
      setStatus('Connect', false);
      connectBtn.disabled = false;
    }
  };

  // ---- the user's sketch (p5 global mode) ----
  // pong.js — Qwiic Joystick Pong
// Single-player Pong driven by the SparkFun Qwiic Joystick.
// Reads the same CSV stream as the visualizer:  x,y,button   (x,y in 0..1023)
// Push the stick UP / DOWN to move the left paddle. Press the button to serve.
//
//   serialRead()  -> latest raw line, e.g. "512,498,0"
//   serialLines() -> recent raw lines (unused here, kept for parity)
//   serialEvent() -> fires per new line (kept for parity)
//
// Built for tinyStudio's harness. If the serial functions aren't present
// (e.g. a plain browser / the p5 web editor), it falls back to the mouse so
// you can test the game logic before wiring up hardware.

const RANGE = 1023;          // 10-bit ADC full scale
const WIN_SCORE = 7;

// ---- palette (matches the visualizer) ----
const C_BG     = [10, 15, 45];
const C_NET    = [26, 34, 70];
const C_PLAYER = [255, 255, 255];   // cyan
const C_AI     = [255, 255, 255];  // pink
const C_BALL   = [255, 215, 0];   // gold
const C_TEXT   = [150, 162, 196];

// ---- geometry ----
const PADDLE_W = 12;
const PADDLE_H = 84;
const PADDLE_INSET = 26;     // distance of the paddle face from the wall
const BALL_R = 9;
const AI_MAX_SPEED = 5.2;    // lower = easier to beat

let player, ai, ball;
let scoreP = 0, scoreA = 0;
let state = 'serve';         // 'serve' | 'play' | 'over'
let winner = '';
let joyY = 512, lastBtn = 0;

function setup() {
  createCanvas(640, 440);
  textFont('monospace');
  player = { x: PADDLE_INSET, y: height / 2 };
  ai     = { x: width - PADDLE_INSET, y: height / 2 };
  resetBall(1);
}

// parse "x,y,button" -> {x,y,b} or null  (same regex as the visualizer)
function parseLine(s) {
  let m = String(s).match(/(-?\d+)\s*,\s*(-?\d+)(?:\s*,\s*(\d+))?/);
  if (!m) return null;
  return { x: int(m[1]), y: int(m[2]), b: m[3] ? int(m[3]) : 0 };
}

// read the joystick if the harness is present, else null
function readJoystick() {
  if (typeof serialRead !== 'function') return null;
  return parseLine(serialRead());
}

function resetBall(dir) {
  // dir: +1 serves right (toward CPU), -1 serves left (toward you)
  ball = {
    x: width / 2,
    y: height / 2,
    vx: 4.2 * dir,
    vy: random(-2.2, 2.2),
    speed: 4.6
  };
}

function draw() {
  background(C_BG);
  handleInput();
  if (state === 'play') updateBall();
  drawNet();
  drawPaddles();
  drawBall();
  drawHud();
}

function handleInput() {
  let p = readJoystick();
  let btn = 0;

  if (p) {
    joyY = p.y;          // fresh joystick sample
    btn = p.b;
  } else if (typeof serialRead !== 'function') {
    // no harness: mouse Y drives the paddle, click serves
    joyY = map(mouseY, height, 0, 0, RANGE, true);
    btn = mouseIsPressed ? 1 : 0;
  }
  // (harness present but no parseable line yet -> keep last joyY, btn stays 0)

  // stick UP -> paddle UP, matching the visualizer's inverted Y
  player.y = map(joyY, 0, RANGE, height - PADDLE_H / 2, PADDLE_H / 2, true);

  // rising-edge button: serve or restart
  if (btn === 1 && lastBtn === 0) onButton();
  lastBtn = btn;
}

function onButton() {
  if (state === 'serve') {
    state = 'play';
  } else if (state === 'over') {
    scoreP = 0;
    scoreA = 0;
    winner = '';
    state = 'serve';
    resetBall(random() < 0.5 ? 1 : -1);
  }
}

function updateBall() {
  ball.x += ball.vx;
  ball.y += ball.vy;

  // top / bottom walls
  if (ball.y - BALL_R < 0)      { ball.y = BALL_R; ball.vy *= -1; }
  if (ball.y + BALL_R > height) { ball.y = height - BALL_R; ball.vy *= -1; }

  bouncePaddle(player, +1);   // left paddle -> ball leaves rightward
  bouncePaddle(ai, -1);       // right paddle -> ball leaves leftward

  // CPU: chase only while the ball approaches, else drift back to center
  let targetY = ball.vx > 0 ? ball.y : height / 2;
  ai.y += constrain(targetY - ai.y, -AI_MAX_SPEED, AI_MAX_SPEED);
  ai.y = constrain(ai.y, PADDLE_H / 2, height - PADDLE_H / 2);

  // scoring
  if (ball.x + BALL_R < 0)     { scoreA++; afterPoint(-1); }  // CPU scored
  if (ball.x - BALL_R > width) { scoreP++; afterPoint(+1); }  // you scored
}

function bouncePaddle(pad, dir) {
  // dir: +1 = paddle on the left, -1 = paddle on the right
  let halfW = PADDLE_W / 2;
  let halfH = PADDLE_H / 2;

  // only register a hit when the ball is heading toward this paddle
  if (dir > 0 && ball.vx >= 0) return;
  if (dir < 0 && ball.vx <= 0) return;

  let withinX = abs(ball.x - pad.x) <= halfW + BALL_R;
  let withinY = ball.y >= pad.y - halfH - BALL_R &&
                ball.y <= pad.y + halfH + BALL_R;
  if (!(withinX && withinY)) return;

  // reflect with angle based on where it struck the paddle, speed up a touch
  ball.speed = min(ball.speed + 0.35, 11);
  let offset = constrain((ball.y - pad.y) / halfH, -1, 1); // -1 (top) .. 1 (bottom)
  let angle = offset * (PI / 3.2);                         // up to ~56°
  ball.vx = ball.speed * cos(angle) * dir;
  ball.vy = ball.speed * sin(angle);

  // nudge clear so it can't stick inside the paddle
  ball.x = pad.x + dir * (halfW + BALL_R + 0.5);
}

function afterPoint(scorer) {
  // scorer: +1 you scored, -1 CPU scored
  if (scoreP >= WIN_SCORE || scoreA >= WIN_SCORE) {
    state = 'over';
    winner = scoreP > scoreA ? 'PLAYER' : 'CPU';
    return;
  }
  state = 'serve';
  resetBall(scorer);   // serve toward whoever just conceded the point
}

function drawNet() {
  stroke(C_NET);
  strokeWeight(3);
  for (let y = 12; y < height; y += 26) line(width / 2, y, width / 2, y + 14);
}

function drawPaddles() {
  noStroke();
  rectMode(CENTER);
  // player (cyan) with glow
  fill(C_PLAYER[0], C_PLAYER[1], C_PLAYER[2], 60);
  rect(player.x, player.y, PADDLE_W + 8, PADDLE_H + 8, 6);
  fill(C_PLAYER);
  rect(player.x, player.y, PADDLE_W, PADDLE_H, 4);
  // CPU (pink) with glow
  fill(C_AI[0], C_AI[1], C_AI[2], 60);
  rect(ai.x, ai.y, PADDLE_W + 8, PADDLE_H + 8, 6);
  fill(C_AI);
  rect(ai.x, ai.y, PADDLE_W, PADDLE_H, 4);
  rectMode(CORNER);
}

function drawBall() {
  noStroke();
  fill(C_BALL[0], C_BALL[1], C_BALL[2], 60);
  circle(ball.x, ball.y, BALL_R * 2 + 12);
  fill(C_BALL);
  circle(ball.x, ball.y, BALL_R * 2);
}

function drawHud() {
  noStroke();
  textAlign(CENTER, TOP);
  textSize(34);
  fill(C_PLAYER);
  text(scoreP, width / 2 - 60, 12);
  fill(C_AI);
  text(scoreA, width / 2 + 60, 12);

  textSize(11);
  fill(C_TEXT);
  textAlign(LEFT, TOP);
  text('YOU', 14, 16);
  textAlign(RIGHT, TOP);
  text('CPU', width - 14, 16);

  if (state === 'serve') {
    banner('PRESS BUTTON TO SERVE');
  } else if (state === 'over') {
    banner((winner === 'PLAYER' ? 'YOU WIN!' : 'CPU WINS') + '   PRESS TO RESTART');
  }
}

function banner(msg) {
  noStroke();
  textAlign(CENTER, CENTER);
  textSize(16);
  fill(C_BALL);
  text(msg, width / 2, height - 28);
}

// fires per new serial line (kept for parity with the harness)
function serialEvent(line) {}

  // route serial lines into the sketch's serialEvent(), if defined
  window.addEventListener('tinyserial', function (e) {
    if (typeof serialEvent === 'function') { try { serialEvent(e.detail.line); } catch (err) {} }
  });

  // p5 global mode appends the canvas to <body>; keep moving it into the framed
  // screen until it lands there (covers timing + canvas recreation).
  function placeCanvas() {
    var c = document.querySelector('canvas');
    var stage = document.getElementById('stage');
    if (c && stage && c.parentElement !== stage) stage.appendChild(c);
  }
  new MutationObserver(placeCanvas).observe(document.body, { childList: true, subtree: true });
  window.addEventListener('load', placeCanvas);
  var __t = 0, __iv = setInterval(function () { placeCanvas(); if (++__t > 30) clearInterval(__iv); }, 100);
  </script>
</body>
</html>
